<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artemis II Tracker — 3D Mission Visualization</title>
  <meta name="description" content="Track NASA's Artemis II mission in real-time 3D. Visualize the spacecraft's trajectory from Earth to the Moon using real JPL Horizons ephemeris data.">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://where-is-artemis.com/">
  <meta property="og:title" content="Where is Artemis II? — Live 3D Mission Tracker">
  <meta property="og:description" content="Track NASA's Artemis II mission in real-time 3D. Scroll through the full trajectory from Earth orbit to lunar flyby and back, using real JPL Horizons data.">
  <meta property="og:image" content="https://where-is-artemis.com/social-card.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Where is Artemis II? — Live 3D Mission Tracker">
  <meta name="twitter:description" content="Track NASA's Artemis II mission in real-time 3D. Scroll through the full trajectory from Earth orbit to lunar flyby and back, using real JPL Horizons data.">
  <meta name="twitter:image" content="https://where-is-artemis.com/social-card.png">

  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <canvas id="scene-canvas"></canvas>

  <div id="loading">
    <div class="spinner"></div>
    <p>Loading Artemis II trajectory data from JPL Horizons...</p>
  </div>

  <div id="header">
    <h1>ARTEMIS II</h1>
    <span class="subtitle">Real-Time 3D Mission Tracker</span>
  </div>

  <div id="controls" style="display: none;">
    <div id="info-panel">
      <div class="info-row">
        <span class="info-label">Date/Time</span>
        <span id="time-display" class="info-value">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Mission Elapsed</span>
        <span id="met-display" class="info-value">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Phase</span>
        <span id="phase-display" class="info-value">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Altitude (Earth)</span>
        <span id="dist-earth" class="info-value">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Distance (Moon)</span>
        <span id="dist-moon" class="info-value">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Velocity</span>
        <span id="velocity" class="info-value">—</span>
      </div>
    </div>

    <div id="timeline-bar">
      <button id="play-btn" title="Play">▶</button>
      <input type="range" id="scrubber" value="0">
      <select id="speed-select" title="Playback speed">
        <option value="100">100x</option>
        <option value="500" selected>500x</option>
        <option value="2000">2,000x</option>
        <option value="5000">5,000x</option>
        <option value="10000">10,000x</option>
      </select>
    </div>
  </div>

  <div id="legend">
    <div class="legend-item"><span class="dot" style="background: #00d9ff;"></span> Past trajectory</div>
    <div class="legend-item"><span class="dot" style="background: #263059;"></span> Future trajectory</div>
    <div class="legend-item"><span class="dot" style="background: #ffffff;"></span> Spacecraft</div>
    <a id="github-link" href="https://github.com/marekolszewski/where-is-artemis" target="_blank" rel="noopener">
      <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
      Source
    </a>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
